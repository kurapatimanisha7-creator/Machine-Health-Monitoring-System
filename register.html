{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Create Your Account</h2>
            <p class="text-muted">Join the smart factory monitoring platform</p>
          </div>
          <form method="post">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="full_name" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone" />
              </div>
              <div class="col-12">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" name="location" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" name="confirm_password" required />
              </div>
            </div>
            <button class="btn btn-primary w-100 mt-4">Register</button>
          </form>
          <div class="text-center mt-3">
            <a href="{{ url_for('login') }}">Already have an account?</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
